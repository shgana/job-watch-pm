name: Job Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 21 * * *"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Detect browser-backed sources
        id: browser
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("config/companies.toml").read_text(encoding="utf-8"))
          needs_browser = any(
              company.get("enabled", True) and company.get("requires_browser", False)
              for company in data.get("company", [])
          )
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"needs_browser={'true' if needs_browser else 'false'}\n")
          PY

      - name: Install Playwright browser dependencies
        if: steps.browser.outputs.needs_browser == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Run default test suite
        run: python -m pytest -q

      - name: Run scheduled scan
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          mkdir -p artifacts
          job-watch scan

      - name: Capture source health snapshot
        if: always()
        run: |
          mkdir -p artifacts
          job-watch sources-check --format json --output artifacts/source-health.json || true

      - name: Build status dashboard
        if: always()
        run: |
          if [ -f artifacts/source-health.json ]; then
            python - <<'PY'
            import json
            from datetime import datetime, UTC
            from html import escape
            from pathlib import Path

            payload = json.loads(Path("artifacts/source-health.json").read_text(encoding="utf-8"))
            rows = []
            ok_count = 0
            err_count = 0
            for item in payload:
                ok = bool(item.get("ok", False))
                if ok:
                    ok_count += 1
                else:
                    err_count += 1
                rows.append(
                    {
                        "company": str(item.get("company_slug", "")),
                        "source": str(item.get("ats_kind", "")),
                        "jobs": str(item.get("jobs_found", 0)),
                        "ok": ok,
                        "error": str(item.get("error") or ""),
                    }
                )
            rows.sort(key=lambda row: row["company"])
            rendered_rows = []
            for row in rows:
                status_class = "status-ok" if row["ok"] else "status-error"
                status_label = "green" if row["ok"] else "red"
                rendered_rows.append(
                    "<tr>"
                    f"<td>{escape(row['company'])}</td>"
                    f"<td>{escape(row['source'])}</td>"
                    f"<td>{escape(row['jobs'])}</td>"
                    f"<td><span class='status {status_class}'>{status_label}</span></td>"
                    f"<td>{escape(row['error'])}</td>"
                    "</tr>"
                )

            generated = datetime.now(tz=UTC).strftime("%Y-%m-%d %H:%M:%S UTC")
            html = f"""<!doctype html>
            <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Job Watch Source Status</title>
              <style>
                body {{ margin: 0; padding: 24px; background: #f8fafc; color: #0f172a; font-family: -apple-system, Segoe UI, Arial, sans-serif; }}
                .card {{ max-width: 1200px; margin: 0 auto; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 20px; }}
                h1 {{ margin: 0 0 6px; font-size: 24px; }}
                .meta {{ margin: 0 0 16px; color: #475569; font-size: 14px; }}
                .summary {{ display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; font-size: 14px; }}
                .pill {{ border-radius: 9999px; padding: 6px 10px; border: 1px solid #e2e8f0; background: #f1f5f9; }}
                table {{ width: 100%; border-collapse: collapse; font-size: 14px; }}
                th, td {{ text-align: left; padding: 8px 10px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }}
                th {{ color: #475569; font-weight: 600; background: #f8fafc; }}
                .status {{ display: inline-block; border-radius: 9999px; padding: 3px 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; }}
                .status-ok {{ background: #dcfce7; color: #166534; }}
                .status-error {{ background: #fee2e2; color: #991b1b; }}
              </style>
            </head>
            <body>
              <div class="card">
                <h1>Job Watch Source Status</h1>
                <p class="meta">Generated: {generated}</p>
                <div class="summary">
                  <span class="pill">Total Companies: {len(rows)}</span>
                  <span class="pill">Green: {ok_count}</span>
                  <span class="pill">Red: {err_count}</span>
                </div>
                <table>
                  <thead><tr><th>Company</th><th>Source</th><th>Jobs</th><th>Status</th><th>Error</th></tr></thead>
                  <tbody>{''.join(rendered_rows)}</tbody>
                </table>
              </div>
            </body>
            </html>
            """
            Path("artifacts/status-dashboard.html").write_text(html, encoding="utf-8")
            print("Wrote status dashboard to artifacts/status-dashboard.html")
            PY
          fi

      - name: Prepare Pages site
        if: always()
        run: |
          mkdir -p artifacts/site
          if [ -f artifacts/status-dashboard.html ]; then
            cp artifacts/status-dashboard.html artifacts/site/index.html
          else
            cat <<'HTML' > artifacts/site/index.html
          <!doctype html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Job Watch Source Status</title></head>
          <body><h1>Job Watch Source Status</h1><p>Dashboard generation failed for this run.</p></body>
          </html>
          HTML
          fi

      - name: Publish scan summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          health_path = Path("artifacts/source-health.json")
          if not health_path.exists():
              print("No source health report generated.")
              raise SystemExit(0)

          payload = json.loads(health_path.read_text(encoding="utf-8"))
          failures = [item for item in payload if not item.get("ok", False)]
          lines = [
              "## Job Watch Source Health",
              "",
              f"- checked companies: {len(payload)}",
              f"- failures: {len(failures)}",
              "",
              "| company | source | jobs | status | error |",
              "| --- | --- | ---: | --- | --- |",
          ]
          for item in payload:
              escaped_error = (item.get("error") or "").replace("|", "\\|")
              status = "green" if item.get("ok", False) else "red"
              lines.append(
                  f"| {item.get('company_slug', '')} | {item.get('ats_kind', '')} | "
                  f"{item.get('jobs_found', 0)} | {status} | {escaped_error} |"
              )
          summary_file = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-summary
          path: |
            artifacts/source-health.json
            artifacts/status-dashboard.html
            artifacts/site/index.html
          if-no-files-found: warn

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/site

  deploy-pages:
    if: always()
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish Pages URL
        run: |
          {
            echo "## Dashboard URL"
            echo
            echo "- page: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
