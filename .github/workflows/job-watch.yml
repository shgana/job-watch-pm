name: Job Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 21 * * *"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Detect browser-backed sources
        id: browser
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("config/companies.toml").read_text(encoding="utf-8"))
          needs_browser = any(
              company.get("enabled", True) and company.get("requires_browser", False)
              for company in data.get("company", [])
          )
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"needs_browser={'true' if needs_browser else 'false'}\n")
          PY

      - name: Install Playwright browser dependencies
        if: steps.browser.outputs.needs_browser == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Run default test suite
        run: python -m pytest -q

      - name: Run scheduled scan
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          mkdir -p artifacts
          if job-watch scan --help | grep -q -- '--format'; then
            job-watch scan --format json --output artifacts/scan-summary.json
          else
            job-watch scan
          fi

      - name: Capture source health snapshot
        if: always()
        run: |
          mkdir -p artifacts
          job-watch sources-check --format json --output artifacts/source-health.json || true

      - name: Build status dashboard
        if: always()
        run: |
          python scripts/build_status_dashboard.py \
            --scan-report artifacts/scan-summary.json \
            --sources-report artifacts/source-health.json \
            --output artifacts/status-dashboard.html

      - name: Prepare Pages site
        if: always()
        run: |
          mkdir -p artifacts/site
          if [ -f artifacts/status-dashboard.html ]; then
            cp artifacts/status-dashboard.html artifacts/site/index.html
          else
            cat <<'HTML' > artifacts/site/index.html
          <!doctype html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Job Watch Source Status</title></head>
          <body><h1>Job Watch Source Status</h1><p>Dashboard generation failed for this run.</p></body>
          </html>
          HTML
          fi

      - name: Publish scan summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          health_path = Path("artifacts/source-health.json")
          if not health_path.exists():
              print("No source health report generated.")
              raise SystemExit(0)

          payload = json.loads(health_path.read_text(encoding="utf-8"))
          failures = [item for item in payload if not item.get("ok", False)]
          lines = [
              "## Job Watch Source Health",
              "",
              f"- checked companies: {len(payload)}",
              f"- failures: {len(failures)}",
              "",
              "| company | source | jobs | status | error |",
              "| --- | --- | ---: | --- | --- |",
          ]
          for item in payload:
              escaped_error = (item.get("error") or "").replace("|", "\\|")
              status = "green" if item.get("ok", False) else "red"
              lines.append(
                  f"| {item.get('company_slug', '')} | {item.get('ats_kind', '')} | "
                  f"{item.get('jobs_found', 0)} | {status} | {escaped_error} |"
              )
          summary_file = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-summary
          path: |
            artifacts/scan-summary.json
            artifacts/source-health.json
            artifacts/status-dashboard.html
            artifacts/site/index.html
          if-no-files-found: warn

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/site

  deploy-pages:
    if: always()
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish Pages URL
        run: |
          {
            echo "## Dashboard URL"
            echo
            echo "- page: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
