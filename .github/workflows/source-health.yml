name: Source Health

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run live source validation
        env:
          JOB_WATCH_RUN_LIVE_TESTS: "1"
        run: python -m pytest -q tests/test_live_sources.py
